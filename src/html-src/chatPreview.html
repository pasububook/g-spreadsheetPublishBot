<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Google Chat 送信プレビュー</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  
  <link rel="stylesheet" href="./style/base.css">
  <link rel="stylesheet" href="./style/layout.css">
  <link rel="stylesheet" href="./style/components.css">
  <link rel="stylesheet" href="./style/chatPreview.css">
</head>
<body>

  <div class="layout">

    <!-- ヘッダー -->
    <div class="modal-header">
      <div class="view-controls">
        <button class="view-btn" data-view="left" title="編集のみ表示">
          <span class="material-symbols-outlined">dock_to_left</span>
        </button>
        <button class="view-btn active" data-view="split" title="分割表示">
          <span class="material-symbols-outlined">vertical_split</span>
        </button>
        <button class="view-btn" data-view="right" title="プレビューのみ表示">
          <span class="material-symbols-outlined">dock_to_right</span>
        </button>
      </div>
    </div>

    <!-- ボディ -->
    <div class="modal-body">

      <!-- 左パネル: 変更内容 -->
      <div class="panel panel-left" id="panel-left">
        <div class="panel-scroll" id="panel-left-scroll">
          <div class="left-content-wrapper">

            <div class="edit-card">
              <div class="card-header">
                <h3 class="card-title">Google Chat 送信内容</h3>
              </div>
              <div class="card-body">

                <div class="form-group">
                  <label class="form-label">変更内容 (取得済み)</label>
                  <!-- ローディング中 -->
                  <div class="changes-loading" id="changes-loading">
                    <div class="changes-spinner"></div>
                    <span>変更内容を取得しています…</span>
                  </div>
                  <!-- エラー -->
                  <div class="changes-error hidden" id="changes-error">
                    変更内容を取得できませんでした。
                  </div>
                  <!-- リスト (ロード後に表示) -->
                  <ul class="changes-list hidden" id="changes-list"></ul>
                </div>

              </div>
            </div>

          </div>
        </div>
        <div class="scroll-fade scroll-fade-left hidden" id="scroll-fade-left">
          <div class="scroll-chevron"><span class="material-symbols-outlined">expand_more</span></div>
        </div>
      </div>

      <!-- 右パネル: PDF プレビュー -->
      <div class="panel panel-right" id="panel-right">
        <div class="panel-scroll" id="panel-right-scroll">
          <div class="pdf-container">
            <!-- 読み込み中表示 -->
            <div class="pdf-status" id="pdf-status-loading">
              <div class="pdf-spinner"></div>
              <p>PDF プレビューを生成しています…<br><small>送信ボタンはいつでも使用できます。</small></p>
            </div>
            <!-- エラー表示 -->
            <div class="pdf-status hidden" id="pdf-status-error">
              <span class="material-symbols-outlined pdf-error-icon">warning</span>
              <p>プレビューを読み込めませんでした。<br><small>送信は引き続き実行できます。</small></p>
              <button class="btn-retry" id="btn-retry">
                <span class="material-symbols-outlined" style="font-size:16px">refresh</span>
                再試行
              </button>
            </div>
            <!-- PDF.js キャンバスレンダリングエリア -->
            <div id="pdf-canvas-wrapper"></div>
          </div>
        </div>
        <div class="scroll-fade scroll-fade-right-white hidden" id="scroll-fade-right">
          <div class="scroll-chevron"><span class="material-symbols-outlined">expand_more</span></div>
        </div>
      </div>

    </div>

    <!-- フッター -->
    <div class="modal-footer">
      <button class="btn btn-secondary" id="btn-cancel">キャンセル</button>
      <button class="btn btn-primary" id="btn-submit">
        <span class="material-symbols-outlined">send</span>
        Google Chat に送信
      </button>
    </div>

  </div>

  <script type="module" src="./scripts/chatPreview/main.js"></script>
</body>
</html>
